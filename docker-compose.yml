# ═══════════════════════════════════════════════════════════════════════════
# nyxara-core — COMMUNITY compose (MIT, open-source)
# Standalone stack for anyone who clones the public repo and runs it locally.
# Contains NO SaaS infra (no Postgres, no auth, no billing).
#
#   docker compose up --build
# ═══════════════════════════════════════════════════════════════════════════

networks:
  nyxara_core_net:
    driver: bridge

volumes:
  qdrant_data:
  redis_data:
  # hf_cache: re-add when Phase 1 embeds with bge-m3 (weights ~4.5GB, cache once)

services:
  # ── Redis — cache & Celery broker ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nyxara-core-redis
    ports:
      - "6399:6379"
    volumes:
      - redis_data:/data
    networks:
      - nyxara_core_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Qdrant — vector database ───────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: nyxara-core-qdrant
    ports:
      - "6353:6333"   # REST
      - "6354:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - nyxara_core_net
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Core API — FastAPI application ─────────────────────────────────────
  core-api:
    image: nyxara-core-api:local-dev
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nyxara-core-api
    ports:
      - "8100:8000"
    env_file:
      - .env
    environment:
      # Service-discovery overrides (container hostnames)
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
    # Lets the container reach an Ollama server on the host for the CRAG grader LLM
    # (INFERENCE_BASE_URL=http://host.docker.internal:11434/v1 in .env).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - nyxara_core_net

  # NOTE (RESET 2026-07): the `harvester` and `ingest` services were removed along
  # with the old scraper/CLI. When Phase 0 (Ingestion) and Phase 1 (Vector Memory)
  # are rebuilt, re-add a one-shot ingest service here that reads from raw_data_lake
  # and embeds into Qdrant.
